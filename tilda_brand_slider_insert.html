<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tilda Brand Slider Insert</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <style>
        .brand-slider-container {
            margin: 20px 0;
            position: relative;
        }
        .brand-slider-container .swiper {
            overflow: visible;
        }
        .brand-slider-container .swiper-wrapper {
            align-items: center;
        }
        .brand-slider-container .swiper-slide {
            width: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            padding: 8px;
            margin: 0 4px;
        }
        .brand-slider-container .swiper-slide:hover {
            transform: scale(1.05);
        }
        .brand-slider-container .swiper-slide.active {
            border: 2px solid #00ff00;
            background-color: rgba(0, 255, 0, 0.1);
        }
        .brand-slider-container .brand-image {
            max-height: 60px;
            max-width: 120px;
            object-fit: contain;
            filter: grayscale(100%);
            transition: filter 0.3s ease;
        }
        .brand-slider-container .swiper-slide.active .brand-image {
            filter: grayscale(0%);
        }
        .brand-slider-container .brand-name {
            font-size: 12px;
            text-align: center;
            margin-top: 4px;
            color: #666;
        }
        .brand-slider-container .swiper-slide.active .brand-name {
            color: #000;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .brand-slider-container .brand-image {
                max-height: 50px;
                max-width: 100px;
            }
            .brand-slider-container .swiper-slide {
                padding: 6px;
                margin: 0 2px;
            }
        }
    </style>
</head>
<body>
    <div id="brand-slider-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        async function loadBrandImages() {
            try {
                const response = await fetch('https://planetamarket.tilda.ws/brand_list');
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Updated selector: target t827 gallery block
                const images = doc.querySelectorAll('.t827 img');
                const brandImages = [];
                
                images.forEach(img => {
                    const name = img.getAttribute('alt') || img.getAttribute('title') || 'Unknown Brand';
                    const src = img.getAttribute('data-original') || img.src;
                    
                    if (name && src && !src.includes('empty/')) {
                        brandImages.push({
                            name: name.trim(),
                            src: src
                        });
                    }
                });
                
                return brandImages;
            } catch (error) {
                console.error('Error loading brand images:', error);
                return [];
            }
        }

        function initBrandSlider(brandImages) {
            const placeholder = document.getElementById('brand-slider-placeholder');
            if (!placeholder) return;

            // Create slider HTML
            const sliderHTML = `
                <div class="brand-slider-container">
                    <div class="swiper brand-swiper">
                        <div class="swiper-wrapper">
                            ${brandImages.map(brand => `
                                <div class="swiper-slide" data-brand="${brand.name}">
                                    <img src="${brand.src}" alt="${brand.name}" class="brand-image" loading="lazy">
                                    <div class="brand-name">${brand.name}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            placeholder.innerHTML = sliderHTML;

            // Initialize Swiper
            const swiper = new Swiper('.brand-swiper', {
                slidesPerView: 'auto',
                spaceBetween: 0,
                freeMode: true,
                grabCursor: true,
                breakpoints: {
                    768: {
                        spaceBetween: 0
                    }
                }
            });

            // Add click handlers
            document.querySelectorAll('.brand-slider-container .swiper-slide').forEach(slide => {
                slide.addEventListener('click', function() {
                    const brandName = this.getAttribute('data-brand');
                    clickBrandCheckbox(brandName);
                    updateSliderStyles();
                });
            });

            // Initial style update
            updateSliderStyles();

            // Watch for filter changes
            const observer = new MutationObserver(updateSliderStyles);
            const filterContainer = document.querySelector('.t-store__filter');
            if (filterContainer) {
                observer.observe(filterContainer, { childList: true, subtree: true });
            }
        }

        function updateSliderStyles() {
            const slides = document.querySelectorAll('.brand-slider-container .swiper-slide');
            slides.forEach(slide => {
                const brandName = slide.getAttribute('data-brand');
                const checkbox = document.querySelector(`input[type="checkbox"][value="${brandName}"]`);
                if (checkbox && checkbox.checked) {
                    slide.classList.add('active');
                } else {
                    slide.classList.remove('active');
                }
            });
        }

        function clickBrandCheckbox(brandName) {
            const checkbox = document.querySelector(`input[type="checkbox"][value="${brandName}"]`);
            if (checkbox) {
                checkbox.checked = !checkbox.checked;
                // Trigger change event
                const event = new Event('change', { bubbles: true });
                checkbox.dispatchEvent(event);
            }
        }

        function hideAvailabilityText() {
            const style = document.createElement('style');
            style.textContent = `
                .t-store__filter .t-filter__item:contains("Наличие"),
                .t-store__filter .t-filter__item:has-text("Наличие") {
                    display: none !important;
                }
            `;
            document.head.appendChild(style);
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        async function init() {
            hideAvailabilityText();
            const brandImages = await loadBrandImages();
            initBrandSlider(brandImages);
        }
    </script>
</body>
</html>
