name: Raw dump YCLIENTS

on:
  workflow_dispatch: {}

jobs:
  raw-dump:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run raw dump
        shell: pwsh
        env:
          YCLIENTS_PARTNER_TOKEN: ${{ secrets.YCLIENTS_PARTNER_TOKEN }}
          YCLIENTS_USER_TOKEN: ${{ secrets.YCLIENTS_USER_TOKEN }}
          YCLIENTS_COMPANY_ID: ${{ secrets.YCLIENTS_COMPANY_ID }}
        run: |
          Write-Output 'Running raw-dump (MaxPages=20 PageSize=100)'
          if (Test-Path ./scripts/raw-dump.ps1) {
            & ./scripts/raw-dump.ps1 -CompanyId $env:YCLIENTS_COMPANY_ID -PageSize 100 -MaxPages 20 -MaxOutput 50
          } else {
            Write-Error 'scripts/raw-dump.ps1 not found'
            exit 1
          }