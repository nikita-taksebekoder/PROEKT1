name: Backfill — controlled one-batch import

on:
  workflow_dispatch:
    inputs:
      DryRun:
        description: 'Run as DryRun (true/false)'
        required: false
        default: 'true'
      MaxPages:
        description: 'Max pages to scan'
        required: false
        default: '1'
      BatchSize:
        description: 'How many items per import batch'
        required: false
        default: '5'
      PageSize:
        description: 'YCLIENTS page size (count param)'
        required: false
        default: '100'

jobs:
  import-one-batch:
    runs-on: windows-latest
    name: Controlled import (one-batch)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backfill script (controlled)
        shell: pwsh
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          YCLIENTS_PARTNER_TOKEN: ${{ secrets.YCLIENTS_PARTNER_TOKEN }}
          YCLIENTS_USER_TOKEN: ${{ secrets.YCLIENTS_USER_TOKEN }}
          YCLIENTS_COMPANY_ID: ${{ secrets.YCLIENTS_COMPANY_ID }}
        run: |
          $args = @(
            '-IngestUrl', '${{ secrets.INGEST_URL }}',
            '-AdminKey', '${{ secrets.ADMIN_KEY }}',
            '-PartnerToken', '${{ secrets.YCLIENTS_PARTNER_TOKEN }}',
            '-UserToken', '${{ secrets.YCLIENTS_USER_TOKEN }}',
            '-CompanyId', '${{ secrets.YCLIENTS_COMPANY_ID }}',
            '-MaxPages', '${{ github.event.inputs.MaxPages }}',
            '-BatchSize', '${{ github.event.inputs.BatchSize }}',
            '-PageSize', '${{ github.event.inputs.PageSize }}'
          )
          if ('${{ github.event.inputs.DryRun }}' -eq 'true') { $args += '-DryRun' }
          Write-Output "Invoking backfill.ps1 with args: $($args -join ' ')"
          pwsh -NoProfile -File .\backfill.ps1 @args

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-output
          path: |
            **/run.log
            **/found.log

# Notes:
# - This workflow requires repository secrets: INGEST_URL, ADMIN_KEY, YCLIENTS_PARTNER_TOKEN,
#   YCLIENTS_USER_TOKEN, YCLIENTS_COMPANY_ID. DryRun default=true to be safe; dispatch with
#   DryRun=false to perform real import.