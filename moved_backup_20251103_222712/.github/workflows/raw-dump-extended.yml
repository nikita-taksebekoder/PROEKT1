name: Raw dump (extended)

on:
  workflow_dispatch: {}

jobs:
  raw-dump-extended:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run raw dump (extended)
        shell: pwsh
        env:
          YCLIENTS_PARTNER_TOKEN: ${{ secrets.YCLIENTS_PARTNER_TOKEN }}
          YCLIENTS_USER_TOKEN: ${{ secrets.YCLIENTS_USER_TOKEN }}
          YCLIENTS_COMPANY_ID: ${{ secrets.YCLIENTS_COMPANY_ID }}
        run: |
          Write-Output 'Running scripts/raw-dump.ps1 (MaxPages=300, PageSize=100, MaxOutput=50)'
          if (Test-Path ./scripts/raw-dump.ps1) {
            & ./scripts/raw-dump.ps1 -CompanyId "$env:YCLIENTS_COMPANY_ID" -PageSize 100 -MaxPages 300 -MaxOutput 50 -VerboseAuth
          } else {
            Write-Error 'scripts/raw-dump.ps1 not found'
            exit 1
          }
