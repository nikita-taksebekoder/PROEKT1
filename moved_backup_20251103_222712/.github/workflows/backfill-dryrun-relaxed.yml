name: Backfill dry-run (relaxed, extended)

on:
  workflow_dispatch: {}

jobs:
  dry-run-relaxed:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backfill (dry run, relaxed)
        shell: pwsh
        env:
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
          YCLIENTS_PARTNER_TOKEN: ${{ secrets.YCLIENTS_PARTNER_TOKEN }}
          YCLIENTS_USER_TOKEN: ${{ secrets.YCLIENTS_USER_TOKEN }}
          INGEST_URL: ${{ secrets.INGEST_URL }}
          YCLIENTS_COMPANY_ID: ${{ secrets.YCLIENTS_COMPANY_ID }}
        run: |
          Write-Output 'Running backfill dry-run (relaxed): MaxPages=300 BatchSize=100 PageSize=100 TextMinLength=1'
          if (-not $env:INGEST_URL) {
            Write-Error 'INGEST_URL is required for the script to know the target. Aborting.'
            exit 1
          }
          if (Test-Path ./backfill.ps1) {
            Write-Output 'Invoking ./backfill.ps1 (DryRun, relaxed)'
            & ./backfill.ps1 -IngestUrl "$env:INGEST_URL" -AdminKey "$env:ADMIN_KEY" -PartnerToken "$env:YCLIENTS_PARTNER_TOKEN" -UserToken "$env:YCLIENTS_USER_TOKEN" -CompanyId "$env:YCLIENTS_COMPANY_ID" -PageSize 100 -BatchSize 100 -MaxPages 300 -OnlyReviews:$true -TextMinLength 1 -DryRun
          } else {
            Write-Error 'backfill.ps1 not found in repo'
            exit 1
          }
