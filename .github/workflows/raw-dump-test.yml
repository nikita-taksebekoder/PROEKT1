name: raw-dump-test

on:
  workflow_dispatch: {}

jobs:
  raw-dump:
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run raw-dump (test, MaxPages=5)
        env:
          YCLIENTS_PARTNER_TOKEN: ${{ secrets.YCLIENTS_PARTNER_TOKEN }}
          YCLIENTS_USER_TOKEN: ${{ secrets.YCLIENTS_USER_TOKEN }}
          YCLIENTS_COMPANY_ID: ${{ secrets.YCLIENTS_COMPANY_ID }}
        run: |
          Write-Output 'Running test raw-dump (MaxPages=5 PageSize=100 MaxOutput=20 VerboseAuth)'
          if (Test-Path ./scripts/raw-dump.ps1) {
            & ./scripts/raw-dump.ps1 -CompanyId $env:YCLIENTS_COMPANY_ID -PageSize 100 -MaxPages 5 -MaxOutput 20 -VerboseAuth -PrintBodyOnError
          } else {
            Write-Error 'scripts/raw-dump.ps1 not found'
            exit 1
          }