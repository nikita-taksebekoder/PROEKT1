name: Auto Backfill and Refresh

on:
  schedule:
    # every 2 hours at minute 0
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  auto-backfill:
    name: Backfill (scheduled)
    runs-on: windows-latest
    concurrency:
      group: auto-backfill
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run worker /admin/backfill
        shell: pwsh
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        run: |
          if (-not $env:WORKER_URL -or -not $env:ADMIN_KEY) {
            Write-Output "Missing WORKER_URL or ADMIN_KEY in secrets. Aborting."
            exit 1
          }
          $url = "$env:WORKER_URL/admin/backfill"
          Write-Output "Calling backfill endpoint: $url"
          try {
            $resp = Invoke-RestMethod -Uri $url -Method Post -Headers @{ 'X-Admin-Key' = $env:ADMIN_KEY } -TimeoutSec 600
            Write-Output "Backfill response:"
            $resp | ConvertTo-Json -Depth 4 | Write-Output
          } catch {
            Write-Error "Backfill call failed: $($_.Exception.Message)"
            exit 1
          }

      - name: Trigger events cache refresh (optional)
        shell: pwsh
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        run: |
          # Optionally kick an endpoint to refresh any downstream caches or notify other services.
          $url = "$env:WORKER_URL/admin/enrich"
          Write-Output "Optional: pinging enrich endpoint (no-op if not needed): $url"
          try {
            $r = Invoke-WebRequest -Uri $url -Method Post -Headers @{ 'X-Admin-Key' = $env:ADMIN_KEY } -UseBasicParsing -TimeoutSec 120 -ErrorAction Stop
            Write-Output "Enrich response status: $($r.StatusCode)"
          } catch {
            Write-Output "Enrich ping skipped or failed: $($_.Exception.Message)"
          }
